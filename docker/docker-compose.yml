services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-peregrine_commit}
      MYSQL_USER: ${MYSQL_USER:-peregrine}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD:-changeme}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
