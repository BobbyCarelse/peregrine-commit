name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm exec turbo run build --filter=web

      - name: Create deploy archive
        run: tar -czf deploy.tar.gz -C apps/web/dist .

      - name: Copy archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'deploy.tar.gz'
          target: '/home/${{ secrets.EC2_USER }}/deploy'
          overwrite: true

      - name: Extract release and reload pm2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/home/${{ secrets.EC2_USER }}/peregrine-commit-web
            mkdir -p "$APP_DIR"
            tar -xzf /home/${{ secrets.EC2_USER }}/deploy/deploy.tar.gz -C "$APP_DIR"
            pm2 describe web > /dev/null 2>&1 && pm2 restart web || pm2 serve "$APP_DIR" 4173 --name web
            pm2 save
